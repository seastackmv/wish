name: D1 migrations

# Apply new D1 migrations to the production database whenever a migration lands
# on main. Migrations are tracked in the `d1_migrations` table, so this only runs
# files that haven't been applied yet — re-running is a safe no-op.
#
# Requires two repository secrets (Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN   - a token with "D1:Edit" permission for this account
#   CLOUDFLARE_ACCOUNT_ID  - the Cloudflare account id that owns wish-db

on:
  push:
    branches: [main]
    paths:
      - 'migrations/**'
      - 'wrangler.toml'
      - '.github/workflows/migrate.yml'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Apply migrations
        run: bunx wrangler d1 migrations apply wish-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
